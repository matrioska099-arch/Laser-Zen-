<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Aromas de Victoria Hub</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050508; font-family: -apple-system, sans-serif; color: white; }
        canvas { display: block; touch-action: none; }
        #menu {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(5, 5, 8, 0.98); z-index: 10;
        }
        h1 { font-size: 18px; letter-spacing: 4px; text-shadow: 0 0 10px #00f2ff; margin-bottom: 30px; text-align: center; }
        .btn {
            width: 250px; padding: 15px; margin: 8px;
            background: transparent; border: 1px solid #00f2ff;
            color: #00f2ff; border-radius: 12px; text-align: center;
            font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
        }
        #back-btn {
            position: absolute; top: 50px; right: 20px;
            padding: 10px 15px; background: rgba(255,255,255,0.15);
            border-radius: 10px; font-size: 10px; z-index: 20; display: none; color: #fff;
        }
    </style>
</head>
<body>

    <div id="menu">
        <h1>AROMAS DE VICTORIA<br><small style="font-size: 10px; opacity: 0.6;">STUDIO GAMES</small></h1>
        <div class="btn" onclick="startGame('laser')">Láser Neón</div>
        <div class="btn" onclick="startGame('pizarra')">Borrador de Pizarra</div>
        <div class="btn" onclick="startGame('oro')">Lluvia de Oro</div>
        <div class="btn" onclick="startGame('arena')">Arena Mágica</div>
        <div class="btn" onclick="startGame('diamante')">Destello Diamante</div>
    </div>

    <div id="back-btn" onclick="showMenu()">VOLVER AL MENÚ</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const backBtn = document.getElementById('back-btn');
        let mode = '';
        let particles = [];

        function startGame(type) {
            mode = type;
            menu.style.display = 'none';
            backBtn.style.display = 'block';
            particles = [];
            initCanvas();
        }

        function showMenu() {
            menu.style.display = 'flex';
            backBtn.style.display = 'none';
            mode = '';
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.globalCompositeOperation = 'source-over';
            if (mode === 'pizarra') {
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#0a0a0f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function draw(x, y) {
            if (mode === 'laser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI * 2); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
                ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(x, y, 36, 0, Math.PI * 2); ctx.stroke();
                ctx.shadowBlur = 0;
            } 
            else if (mode === 'pizarra') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI * 2); ctx.fill();
            }
            else if (mode === 'oro' || mode === 'diamante') {
                const color = mode === 'oro' ? '#ffd700' : '#ffffff';
                ctx.globalCompositeOperation = 'source-over';
                for(let i=0; i<6; i++) {
                    ctx.fillStyle = color;
                    ctx.shadowBlur = 15; ctx.shadowColor = color;
                    ctx.beginPath();
                    ctx.arc(x + (Math.random()-0.5)*50, y + (Math.random()-0.5)*50, Math.random()*4, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            else if (mode === 'arena') {
                ctx.globalCompositeOperation = 'source-over';
                for(let i=0; i<8; i++) {
                    ctx.fillStyle = `hsl(${Math.random() * 50 + 180}, 100%, 50%)`; // Tonos azul/turquesa
                    ctx.beginPath();
                    ctx.arc(x + (Math.random()-0.5)*60, y + (Math.random()-0.5)*60, Math.random()*5, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }

        canvas.addEventListener('touchmove', (e) => {
            if(!mode) return;
            e.preventDefault();
            const touch = e.touches[0];
            draw(touch.clientX, touch.clientY);
        }, { passive: false });

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
