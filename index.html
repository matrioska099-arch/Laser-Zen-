<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f2ff; pointer-events: none; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>
    <div id="ui">LaserZen // Modo Creadora</div>
    <canvas id="c"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let cutting = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#050a14'; // Fondo cristalino profundo
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    window.onresize = resize;
    resize();

    function start(e) {
        cutting = true;
        const t = e.touches ? e.touches[0] : e;
        ctx.beginPath();
        ctx.moveTo(t.clientX, t.clientY);
    }

    function move(e) {
        if (!cutting) return;
        const t = e.touches ? e.touches[0] : e;
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';
        
        ctx.lineTo(t.clientX, t.clientY);
        ctx.stroke();

        if (navigator.vibrate) navigator.vibrate(10);
    }

    function end() { cutting = false; }

    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', end);
</script>
</body>
</html>
